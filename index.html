<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #1a1a2e;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 1rem;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    width: min(90vw, 90vh, 600px);
  }

  /* Status bar */
  .status-bar {
    width: 100%;
    background: #16213e;
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }

  .status-text {
    color: #e0e0e8;
    font-size: 1.05rem;
    font-weight: 600;
  }

  .status-text .check-warning {
    color: #e74c3c;
    font-weight: 700;
  }

  .status-text .result {
    color: #f6e96b;
  }

  .turn-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 0.5rem;
    vertical-align: middle;
    border: 2px solid #555;
  }

  .turn-dot.white { background: #fff; }
  .turn-dot.black { background: #222; }

  .new-game-btn {
    background: #0f3460;
    color: #e0e0e8;
    border: 1px solid #1a5276;
    border-radius: 6px;
    padding: 0.45rem 1rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .new-game-btn:hover { background: #1a5276; }
  .new-game-btn:active { transform: scale(0.97); }

  /* Mode selector */
  .mode-selector {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .mode-btn {
    background: #0f3460;
    color: #a0a0b0;
    border: 1px solid #1a5276;
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .mode-btn:hover { background: #1a5276; }
  .mode-btn.active {
    background: #1a5276;
    color: #e0e0e8;
    border-color: #f6e96b;
  }

  .ai-thinking {
    color: #f6e96b;
    font-style: italic;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .board-container.disabled {
    pointer-events: none;
    opacity: 0.85;
  }

  /* Captured pieces */
  .captured-row {
    width: 100%;
    background: #16213e;
    border-radius: 6px;
    padding: 0.4rem 0.75rem;
    min-height: 2.2rem;
    display: flex;
    align-items: center;
    gap: 0.15rem;
    box-shadow: 0 1px 6px rgba(0,0,0,.2);
  }

  .captured-label {
    color: #666;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-right: 0.4rem;
    flex-shrink: 0;
  }

  .captured-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 0.1rem;
    font-size: 1.3rem;
    line-height: 1;
  }

  /* Board */
  .board-container {
    display: inline-grid;
    grid-template-columns: 2rem repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr) 2rem;
    width: 100%;
    aspect-ratio: 1;
    border: 4px solid #16213e;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }

  .rank-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16213e;
    color: #a0a0b0;
    font-size: 0.85rem;
    font-weight: 600;
    width: 2rem;
  }

  .file-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16213e;
    color: #a0a0b0;
    font-size: 0.85rem;
    font-weight: 600;
    height: 2rem;
  }

  .corner {
    background: #16213e;
  }

  .square {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.5rem, 5vw, 3.2rem);
    cursor: pointer;
    user-select: none;
    transition: background-color 0.15s;
    aspect-ratio: 1;
    position: relative;
  }

  .square .piece {
    transition: opacity 0.15s ease;
  }

  .square.light { background: #e8dcc8; }
  .square.dark  { background: #7b6b4f; }
  .square:hover { filter: brightness(1.12); }

  .square.selected { background: #f6e96b !important; }
  .square.valid-move::after {
    content: '';
    position: absolute;
    width: 30%;
    height: 30%;
    background: rgba(0, 0, 0, 0.25);
    border-radius: 50%;
    pointer-events: none;
  }
  .square.valid-move.has-enemy::after {
    width: 85%;
    height: 85%;
    background: transparent;
    border: 5px solid rgba(0, 0, 0, 0.25);
    border-radius: 50%;
  }

  .square.last-move {
    background: rgba(246, 233, 107, 0.35) !important;
  }

  .square.in-check {
    background: #e74c3c !important;
    box-shadow: inset 0 0 12px rgba(0,0,0,.4);
  }

  /* Move animation */
  @keyframes pieceAppear {
    from { transform: scale(0.7); opacity: 0.4; }
    to { transform: scale(1); opacity: 1; }
  }

  .square.just-moved .piece {
    animation: pieceAppear 0.2s ease-out;
  }

  /* Promotion overlay */
  .promotion-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .promotion-overlay.active { display: flex; }
  .promotion-dialog {
    background: #16213e;
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .promotion-dialog h3 {
    color: #a0a0b0;
    margin-bottom: 1rem;
    font-size: 1.1rem;
  }
  .promotion-choices {
    display: flex;
    gap: 0.5rem;
  }
  .promotion-choices button {
    font-size: 2.5rem;
    width: 4rem;
    height: 4rem;
    border: 2px solid #a0a0b0;
    border-radius: 8px;
    background: #e8dcc8;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
  }
  .promotion-choices button:hover {
    transform: scale(1.1);
    border-color: #f6e96b;
  }

  @media (max-width: 500px) {
    .status-bar { padding: 0.5rem 0.75rem; }
    .status-text { font-size: 0.9rem; }
    .new-game-btn { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    .mode-btn { padding: 0.25rem 0.5rem; font-size: 0.7rem; }
    .rank-label, .file-label { font-size: 0.7rem; }
    .rank-label { width: 1.5rem; }
    .board-container { grid-template-columns: 1.5rem repeat(8, 1fr); }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="status-bar">
    <div class="status-text" id="status"><span class="turn-dot white"></span>White's turn</div>
    <div class="mode-selector">
      <button class="mode-btn active" id="modeHvH" title="Human vs Human">HvH</button>
      <button class="mode-btn" id="modeHvAI" title="Human vs AI">HvAI</button>
      <button class="new-game-btn" id="newGameBtn">New Game</button>
    </div>
  </div>

  <div class="captured-row" id="capturedBlack">
    <span class="captured-label">Black:</span>
    <div class="captured-pieces" id="capturedBlackPieces"></div>
  </div>

  <div class="board-container" id="board"></div>

  <div class="captured-row" id="capturedWhite">
    <span class="captured-label">White:</span>
    <div class="captured-pieces" id="capturedWhitePieces"></div>
  </div>
</div>

<div class="promotion-overlay" id="promotion-overlay">
  <div class="promotion-dialog">
    <h3>Promote pawn to:</h3>
    <div class="promotion-choices" id="promotion-choices"></div>
  </div>
</div>

<script>
const PIECES = {
  K: { type: 'king',   color: 'white', symbol: '\u2654' },
  Q: { type: 'queen',  color: 'white', symbol: '\u2655' },
  R: { type: 'rook',   color: 'white', symbol: '\u2656' },
  B: { type: 'bishop', color: 'white', symbol: '\u2657' },
  N: { type: 'knight', color: 'white', symbol: '\u2658' },
  P: { type: 'pawn',   color: 'white', symbol: '\u2659' },
  k: { type: 'king',   color: 'black', symbol: '\u265A' },
  q: { type: 'queen',  color: 'black', symbol: '\u265B' },
  r: { type: 'rook',   color: 'black', symbol: '\u265C' },
  b: { type: 'bishop', color: 'black', symbol: '\u265D' },
  n: { type: 'knight', color: 'black', symbol: '\u265E' },
  p: { type: 'pawn',   color: 'black', symbol: '\u265F' },
};

const PIECE_VALUE = { pawn: 1, knight: 3, bishop: 3, rook: 5, queen: 9, king: 0 };

function makePiece(key) {
  if (!key) return null;
  const p = PIECES[key];
  return { type: p.type, color: p.color, symbol: p.symbol };
}

const INITIAL = [
  ['r','n','b','q','k','b','n','r'],
  ['p','p','p','p','p','p','p','p'],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['P','P','P','P','P','P','P','P'],
  ['R','N','B','Q','K','B','N','R'],
];

const FILES = ['a','b','c','d','e','f','g','h'];
const container = document.getElementById('board');
const statusEl = document.getElementById('status');
const capturedWhiteEl = document.getElementById('capturedWhitePieces');
const capturedBlackEl = document.getElementById('capturedBlackPieces');

let boardState;
let currentTurn;
let selectedSquare;
let validMoves;
let gameOver;
let capturedWhite; // pieces captured BY white (black pieces)
let capturedBlack; // pieces captured BY black (white pieces)
let lastMove;      // { piece, fromRow, fromCol, toRow, toCol }
let hasMoved;      // track king/rook moves for castling
let pendingPromotion; // { row, col } when awaiting promotion choice
let playMode = 'hvh'; // 'hvh' or 'hva'
let aiThinking = false;

function initGameState() {
  boardState = INITIAL.map(row => row.map(makePiece));
  currentTurn = 'white';
  selectedSquare = null;
  validMoves = [];
  gameOver = false;
  capturedWhite = [];
  capturedBlack = [];
  lastMove = null;
  hasMoved = { whiteKing: false, whiteRookA: false, whiteRookH: false, blackKing: false, blackRookA: false, blackRookH: false };
  pendingPromotion = null;
}

function inBounds(r, c) {
  return r >= 0 && r < 8 && c >= 0 && c < 8;
}

function slidingMoves(row, col, directions) {
  const piece = boardState[row][col];
  const moves = [];
  for (const [dr, dc] of directions) {
    let r = row + dr, c = col + dc;
    while (inBounds(r, c)) {
      const target = boardState[r][c];
      if (!target) {
        moves.push({ row: r, col: c });
      } else {
        if (target.color !== piece.color) moves.push({ row: r, col: c });
        break;
      }
      r += dr;
      c += dc;
    }
  }
  return moves;
}

function isSquareAttacked(row, col, byColor) {
  const enemy = byColor === 'white' ? 'black' : 'white';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = boardState[r][c];
      if (!p || p.color !== enemy) continue;
      if (p.type === 'pawn') {
        const dir = p.color === 'white' ? -1 : 1;
        if (r + dir === row && (c - 1 === col || c + 1 === col)) return true;
      } else if (p.type === 'knight') {
        for (const [dr, dc] of [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]) {
          if (r + dr === row && c + dc === col) return true;
        }
      } else if (p.type === 'king') {
        if (Math.abs(r - row) <= 1 && Math.abs(c - col) <= 1) return true;
      } else {
        let dirs = [];
        if (p.type === 'rook' || p.type === 'queen') dirs.push([1,0],[-1,0],[0,1],[0,-1]);
        if (p.type === 'bishop' || p.type === 'queen') dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
        for (const [dr, dc] of dirs) {
          let sr = r + dr, sc = c + dc;
          while (sr >= 0 && sr < 8 && sc >= 0 && sc < 8) {
            if (sr === row && sc === col) return true;
            if (boardState[sr][sc]) break;
            sr += dr; sc += dc;
          }
        }
      }
    }
  }
  return false;
}

function getValidMoves(piece, row, col) {
  const moves = [];

  if (piece.type === 'pawn') {
    const dir = piece.color === 'white' ? -1 : 1;
    const startRow = piece.color === 'white' ? 6 : 1;
    if (inBounds(row + dir, col) && !boardState[row + dir][col]) {
      moves.push({ row: row + dir, col });
      if (row === startRow && !boardState[row + 2 * dir][col]) {
        moves.push({ row: row + 2 * dir, col });
      }
    }
    for (const dc of [-1, 1]) {
      const nr = row + dir, nc = col + dc;
      if (inBounds(nr, nc) && boardState[nr][nc] && boardState[nr][nc].color !== piece.color) {
        moves.push({ row: nr, col: nc });
      }
    }
    // En passant
    if (lastMove && lastMove.piece.type === 'pawn' &&
        Math.abs(lastMove.fromRow - lastMove.toRow) === 2 &&
        lastMove.toRow === row &&
        Math.abs(lastMove.toCol - col) === 1) {
      moves.push({ row: row + dir, col: lastMove.toCol, enPassant: true });
    }
  }

  if (piece.type === 'rook' || piece.type === 'queen') {
    moves.push(...slidingMoves(row, col, [[1,0],[-1,0],[0,1],[0,-1]]));
  }

  if (piece.type === 'bishop' || piece.type === 'queen') {
    moves.push(...slidingMoves(row, col, [[1,1],[1,-1],[-1,1],[-1,-1]]));
  }

  if (piece.type === 'knight') {
    for (const [dr, dc] of [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]) {
      const nr = row + dr, nc = col + dc;
      if (inBounds(nr, nc)) {
        const target = boardState[nr][nc];
        if (!target || target.color !== piece.color) moves.push({ row: nr, col: nc });
      }
    }
  }

  if (piece.type === 'king') {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = row + dr, nc = col + dc;
        if (inBounds(nr, nc)) {
          const target = boardState[nr][nc];
          if (!target || target.color !== piece.color) moves.push({ row: nr, col: nc });
        }
      }
    }
    // Castling
    const isWhite = piece.color === 'white';
    const kingMoved = isWhite ? hasMoved.whiteKing : hasMoved.blackKing;
    if (!kingMoved && !isKingInCheck(piece.color, boardState)) {
      const baseRow = isWhite ? 7 : 0;
      if (row === baseRow && col === 4) {
        // Kingside
        const rookHMoved = isWhite ? hasMoved.whiteRookH : hasMoved.blackRookH;
        if (!rookHMoved && boardState[baseRow][7] && boardState[baseRow][7].type === 'rook' &&
            !boardState[baseRow][5] && !boardState[baseRow][6]) {
          if (!isSquareAttacked(baseRow, 5, piece.color) && !isSquareAttacked(baseRow, 6, piece.color)) {
            moves.push({ row: baseRow, col: 6, castling: 'kingside' });
          }
        }
        // Queenside
        const rookAMoved = isWhite ? hasMoved.whiteRookA : hasMoved.blackRookA;
        if (!rookAMoved && boardState[baseRow][0] && boardState[baseRow][0].type === 'rook' &&
            !boardState[baseRow][1] && !boardState[baseRow][2] && !boardState[baseRow][3]) {
          if (!isSquareAttacked(baseRow, 2, piece.color) && !isSquareAttacked(baseRow, 3, piece.color)) {
            moves.push({ row: baseRow, col: 2, castling: 'queenside' });
          }
        }
      }
    }
  }

  return moves;
}

function findKing(color) {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = boardState[r][c];
      if (p && p.type === 'king' && p.color === color) return { row: r, col: c };
    }
  }
  return null;
}

function isKingInCheck(color, board) {
  let kingRow = -1, kingCol = -1;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = board[r][c];
      if (p && p.type === 'king' && p.color === color) {
        kingRow = r; kingCol = c; break;
      }
    }
    if (kingRow >= 0) break;
  }

  const enemy = color === 'white' ? 'black' : 'white';

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = board[r][c];
      if (!p || p.color !== enemy) continue;

      if (p.type === 'pawn') {
        const dir = p.color === 'white' ? -1 : 1;
        if (r + dir === kingRow && (c - 1 === kingCol || c + 1 === kingCol)) return true;
      } else if (p.type === 'knight') {
        for (const [dr, dc] of [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]) {
          if (r + dr === kingRow && c + dc === kingCol) return true;
        }
      } else if (p.type === 'king') {
        if (Math.abs(r - kingRow) <= 1 && Math.abs(c - kingCol) <= 1) return true;
      } else {
        let dirs = [];
        if (p.type === 'rook' || p.type === 'queen') dirs.push([1,0],[-1,0],[0,1],[0,-1]);
        if (p.type === 'bishop' || p.type === 'queen') dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
        for (const [dr, dc] of dirs) {
          let sr = r + dr, sc = c + dc;
          while (sr >= 0 && sr < 8 && sc >= 0 && sc < 8) {
            if (sr === kingRow && sc === kingCol) return true;
            if (board[sr][sc]) break;
            sr += dr; sc += dc;
          }
        }
      }
    }
  }
  return false;
}

function getLegalMoves(piece, row, col) {
  const pseudo = getValidMoves(piece, row, col);
  return pseudo.filter(m => {
    const saved = boardState[m.row][m.col];
    boardState[m.row][m.col] = boardState[row][col];
    boardState[row][col] = null;

    // For en passant, also remove the captured pawn
    let epCaptured = null;
    if (m.enPassant) {
      epCaptured = boardState[row][m.col];
      boardState[row][m.col] = null;
    }

    const inCheck = isKingInCheck(piece.color, boardState);

    // Undo
    boardState[row][col] = boardState[m.row][m.col];
    boardState[m.row][m.col] = saved;
    if (m.enPassant) boardState[row][m.col] = epCaptured;

    return !inCheck;
  });
}

function hasAnyLegalMoves(color) {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = boardState[r][c];
      if (p && p.color === color && getLegalMoves(p, r, c).length > 0) return true;
    }
  }
  return false;
}

function getSquareEl(row, col) {
  return container.querySelector(`.square[data-row="${row}"][data-col="${col}"]`);
}

function updateStatus() {
  const dot = currentTurn === 'white'
    ? '<span class="turn-dot white"></span>'
    : '<span class="turn-dot black"></span>';
  const name = currentTurn === 'white' ? 'White' : 'Black';

  const inCheck = isKingInCheck(currentTurn, boardState);
  const hasLegal = hasAnyLegalMoves(currentTurn);

  // Highlight king in check
  container.querySelectorAll('.square.in-check').forEach(sq => sq.classList.remove('in-check'));
  for (const color of ['white', 'black']) {
    if (isKingInCheck(color, boardState)) {
      const king = findKing(color);
      if (king) getSquareEl(king.row, king.col).classList.add('in-check');
    }
  }

  if (!hasLegal) {
    gameOver = true;
    if (inCheck) {
      const winner = currentTurn === 'white' ? 'Black' : 'White';
      statusEl.innerHTML = `<span class="result">Checkmate! ${winner} wins!</span>`;
    } else {
      statusEl.innerHTML = `<span class="result">Stalemate &mdash; draw!</span>`;
    }
  } else if (inCheck) {
    statusEl.innerHTML = `${dot}${name}'s turn &mdash; <span class="check-warning">Check!</span>`;
  } else {
    statusEl.innerHTML = `${dot}${name}'s turn`;
  }
}

function updateCaptured() {
  const sortFn = (a, b) => PIECE_VALUE[b.type] - PIECE_VALUE[a.type];
  capturedWhite.sort(sortFn);
  capturedBlack.sort(sortFn);
  capturedWhiteEl.textContent = capturedWhite.map(p => p.symbol).join('');
  capturedBlackEl.textContent = capturedBlack.map(p => p.symbol).join('');
}

function highlightLastMove() {
  container.querySelectorAll('.square.last-move, .square.just-moved').forEach(sq => {
    sq.classList.remove('last-move', 'just-moved');
  });
  if (lastMove) {
    getSquareEl(lastMove.fromRow, lastMove.fromCol).classList.add('last-move');
    const toEl = getSquareEl(lastMove.toRow, lastMove.toCol);
    toEl.classList.add('last-move', 'just-moved');
  }
}

function clearHighlights() {
  container.querySelectorAll('.square.selected, .square.valid-move').forEach(sq => {
    sq.classList.remove('selected', 'valid-move', 'has-enemy');
  });
}

function applyHighlights() {
  if (!selectedSquare) return;
  getSquareEl(selectedSquare.row, selectedSquare.col).classList.add('selected');
  for (const m of validMoves) {
    const el = getSquareEl(m.row, m.col);
    el.classList.add('valid-move');
    if (boardState[m.row][m.col] || m.enPassant) el.classList.add('has-enemy');
  }
}

function setPieceEl(row, col) {
  const el = getSquareEl(row, col);
  el.innerHTML = '';
  const p = boardState[row][col];
  if (p) {
    const span = document.createElement('span');
    span.className = 'piece';
    span.textContent = p.symbol;
    el.appendChild(span);
  }
}

function movePiece(fromRow, fromCol, toRow, toCol, moveInfo) {
  const piece = boardState[fromRow][fromCol];

  // Track hasMoved for castling eligibility
  if (piece.type === 'king') {
    if (piece.color === 'white') hasMoved.whiteKing = true;
    else hasMoved.blackKing = true;
  }
  if (piece.type === 'rook') {
    if (piece.color === 'white') {
      if (fromRow === 7 && fromCol === 0) hasMoved.whiteRookA = true;
      if (fromRow === 7 && fromCol === 7) hasMoved.whiteRookH = true;
    } else {
      if (fromRow === 0 && fromCol === 0) hasMoved.blackRookA = true;
      if (fromRow === 0 && fromCol === 7) hasMoved.blackRookH = true;
    }
  }

  // Handle captures (including marking captured rooks)
  const captured = boardState[toRow][toCol];
  if (captured) {
    if (captured.type === 'rook') {
      if (toRow === 7 && toCol === 0) hasMoved.whiteRookA = true;
      if (toRow === 7 && toCol === 7) hasMoved.whiteRookH = true;
      if (toRow === 0 && toCol === 0) hasMoved.blackRookA = true;
      if (toRow === 0 && toCol === 7) hasMoved.blackRookH = true;
    }
    if (captured.color === 'white') {
      capturedBlack.push(captured);
    } else {
      capturedWhite.push(captured);
    }
    updateCaptured();
  }

  // Handle en passant capture
  if (moveInfo && moveInfo.enPassant) {
    const epPawn = boardState[fromRow][toCol];
    if (epPawn) {
      if (epPawn.color === 'white') capturedBlack.push(epPawn);
      else capturedWhite.push(epPawn);
      updateCaptured();
    }
    boardState[fromRow][toCol] = null;
    setPieceEl(fromRow, toCol);
  }

  // Record last move for en passant detection
  lastMove = { piece: { ...piece }, fromRow, fromCol, toRow, toCol };

  // Execute move
  boardState[toRow][toCol] = piece;
  boardState[fromRow][fromCol] = null;

  // Handle castling rook movement
  if (moveInfo && moveInfo.castling) {
    const baseRow = toRow;
    if (moveInfo.castling === 'kingside') {
      boardState[baseRow][5] = boardState[baseRow][7];
      boardState[baseRow][7] = null;
      setPieceEl(baseRow, 7);
      setPieceEl(baseRow, 5);
    } else {
      boardState[baseRow][3] = boardState[baseRow][0];
      boardState[baseRow][0] = null;
      setPieceEl(baseRow, 0);
      setPieceEl(baseRow, 3);
    }
  }

  // Update DOM
  setPieceEl(fromRow, fromCol);
  setPieceEl(toRow, toCol);

  highlightLastMove();

  // Check for pawn promotion
  const promoRow = piece.color === 'white' ? 0 : 7;
  if (piece.type === 'pawn' && toRow === promoRow) {
    pendingPromotion = { row: toRow, col: toCol };
    showPromotionDialog(piece.color);
    return; // Don't switch turn yet
  }

  finishTurn();
}

function finishTurn() {
  currentTurn = currentTurn === 'white' ? 'black' : 'white';
  updateStatus();
  // Trigger AI move in HvAI mode when it's black's turn
  if (playMode === 'hva' && currentTurn === 'black' && !gameOver) {
    triggerAiMove();
  }
}

function showPromotionDialog(color) {
  const overlay = document.getElementById('promotion-overlay');
  const choices = document.getElementById('promotion-choices');
  choices.innerHTML = '';
  const types = ['queen', 'rook', 'bishop', 'knight'];
  const keys = color === 'white' ? ['Q', 'R', 'B', 'N'] : ['q', 'r', 'b', 'n'];
  for (let i = 0; i < 4; i++) {
    const btn = document.createElement('button');
    btn.textContent = PIECES[keys[i]].symbol;
    btn.title = types[i].charAt(0).toUpperCase() + types[i].slice(1);
    btn.addEventListener('click', () => promoteToType(keys[i]));
    choices.appendChild(btn);
  }
  overlay.classList.add('active');
}

function promoteToType(key) {
  const { row, col } = pendingPromotion;
  const newPiece = makePiece(key);
  boardState[row][col] = newPiece;
  setPieceEl(row, col);
  pendingPromotion = null;
  document.getElementById('promotion-overlay').classList.remove('active');
  finishTurn();
}

function handleClick(row, col) {
  if (gameOver || pendingPromotion || aiThinking) return;
  // In AI mode, human can only move white pieces
  if (playMode === 'hva' && currentTurn === 'black') return;
  const piece = boardState[row][col];

  if (selectedSquare) {
    const move = validMoves.find(m => m.row === row && m.col === col);
    if (move) {
      clearHighlights();
      movePiece(selectedSquare.row, selectedSquare.col, row, col, move);
      selectedSquare = null;
      validMoves = [];
      return;
    }

    const prevRow = selectedSquare.row;
    const prevCol = selectedSquare.col;
    clearHighlights();
    selectedSquare = null;
    validMoves = [];

    if (piece && piece.color === currentTurn && !(row === prevRow && col === prevCol)) {
      // fall through to selection below
    } else {
      return;
    }
  }

  if (piece && piece.color === currentTurn) {
    selectedSquare = { row, col };
    validMoves = getLegalMoves(piece, row, col);
    applyHighlights();
  }
}

function buildBoard() {
  container.innerHTML = '';
  for (let row = 0; row < 8; row++) {
    const rl = document.createElement('div');
    rl.className = 'rank-label';
    rl.textContent = 8 - row;
    container.appendChild(rl);

    for (let col = 0; col < 8; col++) {
      const sq = document.createElement('div');
      const isLight = (row + col) % 2 === 0;
      sq.className = 'square ' + (isLight ? 'light' : 'dark');
      sq.dataset.row = row;
      sq.dataset.col = col;

      const piece = boardState[row][col];
      if (piece) {
        const span = document.createElement('span');
        span.className = 'piece';
        span.textContent = piece.symbol;
        sq.appendChild(span);
      }

      sq.addEventListener('click', () => handleClick(row, col));
      container.appendChild(sq);
    }
  }

  const corner = document.createElement('div');
  corner.className = 'corner';
  container.appendChild(corner);

  for (const f of FILES) {
    const fl = document.createElement('div');
    fl.className = 'file-label';
    fl.textContent = f;
    container.appendChild(fl);
  }
}

function newGame() {
  initGameState();
  buildBoard();
  updateCaptured();
  updateStatus();
  document.getElementById('promotion-overlay').classList.remove('active');
}

// New Game button
document.getElementById('newGameBtn').addEventListener('click', newGame);

// Mode selector buttons
const modeHvHBtn = document.getElementById('modeHvH');
const modeHvAIBtn = document.getElementById('modeHvAI');

modeHvHBtn.addEventListener('click', () => {
  if (playMode === 'hvh') return;
  playMode = 'hvh';
  modeHvHBtn.classList.add('active');
  modeHvAIBtn.classList.remove('active');
  newGame();
});

modeHvAIBtn.addEventListener('click', () => {
  if (playMode === 'hva') return;
  playMode = 'hva';
  modeHvAIBtn.classList.add('active');
  modeHvHBtn.classList.remove('active');
  newGame();
});

function triggerAiMove() {
  aiThinking = true;
  container.classList.add('disabled');
  statusEl.innerHTML = '<span class="ai-thinking">AI thinking\u2026</span>';

  setTimeout(() => {
    const move = getBestMove(3);
    if (!move) {
      aiThinking = false;
      container.classList.remove('disabled');
      return;
    }

    // Execute the AI move using the same movePiece function
    // But for pawn promotion, AI auto-promotes to queen via movePiece's
    // showPromotionDialog path — we need to handle this differently.
    const piece = boardState[move.fromRow][move.fromCol];
    const promoRow = piece.color === 'white' ? 0 : 7;
    const isPromotion = piece.type === 'pawn' && move.toRow === promoRow;

    movePiece(move.fromRow, move.fromCol, move.toRow, move.toCol, move);

    // If it was a promotion, auto-select queen (movePiece opened the dialog)
    if (isPromotion && pendingPromotion) {
      const queenKey = piece.color === 'white' ? 'Q' : 'q';
      promoteToType(queenKey);
    }

    aiThinking = false;
    container.classList.remove('disabled');
  }, 400);
}

// Initial setup
newGame();

// =========================================================
// AI Engine — Board Evaluation & Minimax Search
// =========================================================

const AI_PIECE_VALUES = {
  pawn: 100,
  knight: 320,
  bishop: 330,
  rook: 500,
  queen: 900,
  king: 20000,
};

// Piece-square tables (from white's perspective; mirrored for black)
// Values are added to the base piece value for positional scoring.
const PST = {
  pawn: [
    [  0,  0,  0,  0,  0,  0,  0,  0],
    [ 50, 50, 50, 50, 50, 50, 50, 50],
    [ 10, 10, 20, 30, 30, 20, 10, 10],
    [  5,  5, 10, 25, 25, 10,  5,  5],
    [  0,  0,  0, 20, 20,  0,  0,  0],
    [  5, -5,-10,  0,  0,-10, -5,  5],
    [  5, 10, 10,-20,-20, 10, 10,  5],
    [  0,  0,  0,  0,  0,  0,  0,  0],
  ],
  knight: [
    [-50,-40,-30,-30,-30,-30,-40,-50],
    [-40,-20,  0,  0,  0,  0,-20,-40],
    [-30,  0, 10, 15, 15, 10,  0,-30],
    [-30,  5, 15, 20, 20, 15,  5,-30],
    [-30,  0, 15, 20, 20, 15,  0,-30],
    [-30,  5, 10, 15, 15, 10,  5,-30],
    [-40,-20,  0,  5,  5,  0,-20,-40],
    [-50,-40,-30,-30,-30,-30,-40,-50],
  ],
  bishop: [
    [-20,-10,-10,-10,-10,-10,-10,-20],
    [-10,  0,  0,  0,  0,  0,  0,-10],
    [-10,  0, 10, 10, 10, 10,  0,-10],
    [-10,  5,  5, 10, 10,  5,  5,-10],
    [-10,  0,  5, 10, 10,  5,  0,-10],
    [-10, 10,  5, 10, 10,  5, 10,-10],
    [-10,  5,  0,  0,  0,  0,  5,-10],
    [-20,-10,-10,-10,-10,-10,-10,-20],
  ],
  rook: [
    [  0,  0,  0,  0,  0,  0,  0,  0],
    [  5, 10, 10, 10, 10, 10, 10,  5],
    [ -5,  0,  0,  0,  0,  0,  0, -5],
    [ -5,  0,  0,  0,  0,  0,  0, -5],
    [ -5,  0,  0,  0,  0,  0,  0, -5],
    [ -5,  0,  0,  0,  0,  0,  0, -5],
    [ -5,  0,  0,  0,  0,  0,  0, -5],
    [  0,  0,  0,  5,  5,  0,  0,  0],
  ],
  queen: [
    [-20,-10,-10, -5, -5,-10,-10,-20],
    [-10,  0,  0,  0,  0,  0,  0,-10],
    [-10,  0,  5,  5,  5,  5,  0,-10],
    [ -5,  0,  5,  5,  5,  5,  0, -5],
    [  0,  0,  5,  5,  5,  5,  0, -5],
    [-10,  5,  5,  5,  5,  5,  0,-10],
    [-10,  0,  5,  0,  0,  0,  0,-10],
    [-20,-10,-10, -5, -5,-10,-10,-20],
  ],
  king: [
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-30,-40,-40,-50,-50,-40,-40,-30],
    [-20,-30,-30,-40,-40,-30,-30,-20],
    [-10,-20,-20,-20,-20,-20,-20,-10],
    [ 20, 20,  0,  0,  0,  0, 20, 20],
    [ 20, 30, 10,  0,  0, 10, 30, 20],
  ],
};

function getPstValue(type, color, row, col) {
  const table = PST[type];
  if (!table) return 0;
  // White pieces use the table as-is; black pieces mirror vertically
  const r = color === 'white' ? row : 7 - row;
  return table[r][col];
}

function evaluateBoard() {
  let score = 0;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = boardState[r][c];
      if (!p) continue;
      const material = AI_PIECE_VALUES[p.type];
      const positional = getPstValue(p.type, p.color, r, c);
      const value = material + positional;
      score += p.color === 'white' ? value : -value;
    }
  }
  return score;
}

// Generate all legal moves for a given color in the current boardState.
// Each move is { fromRow, fromCol, toRow, toCol, enPassant?, castling? }
function generateAllLegalMoves(color) {
  const moves = [];
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = boardState[r][c];
      if (!p || p.color !== color) continue;
      const legal = getLegalMoves(p, r, c);
      for (const m of legal) {
        moves.push({ fromRow: r, fromCol: c, toRow: m.row, toCol: m.col, enPassant: m.enPassant, castling: m.castling });
      }
    }
  }
  return moves;
}

// Apply a move on boardState, returning an undo object to restore later.
// Handles captures, en passant, castling, and auto-queen promotion.
function applyMove(move) {
  const { fromRow, fromCol, toRow, toCol } = move;
  const piece = boardState[fromRow][fromCol];
  const undo = {
    fromRow, fromCol, toRow, toCol,
    piece,
    captured: boardState[toRow][toCol],
    lastMove,
    hasMoved: { ...hasMoved },
    epCaptured: null,
    castlingRook: null,
    promoted: false,
    originalPiece: null,
  };

  // Track king/rook moves for castling
  if (piece.type === 'king') {
    if (piece.color === 'white') hasMoved.whiteKing = true;
    else hasMoved.blackKing = true;
  }
  if (piece.type === 'rook') {
    if (piece.color === 'white') {
      if (fromRow === 7 && fromCol === 0) hasMoved.whiteRookA = true;
      if (fromRow === 7 && fromCol === 7) hasMoved.whiteRookH = true;
    } else {
      if (fromRow === 0 && fromCol === 0) hasMoved.blackRookA = true;
      if (fromRow === 0 && fromCol === 7) hasMoved.blackRookH = true;
    }
  }
  // Mark captured rooks
  const cap = boardState[toRow][toCol];
  if (cap && cap.type === 'rook') {
    if (toRow === 7 && toCol === 0) hasMoved.whiteRookA = true;
    if (toRow === 7 && toCol === 7) hasMoved.whiteRookH = true;
    if (toRow === 0 && toCol === 0) hasMoved.blackRookA = true;
    if (toRow === 0 && toCol === 7) hasMoved.blackRookH = true;
  }

  // En passant capture
  if (move.enPassant) {
    undo.epCaptured = boardState[fromRow][toCol];
    boardState[fromRow][toCol] = null;
  }

  // Execute move
  boardState[toRow][toCol] = piece;
  boardState[fromRow][fromCol] = null;

  // Castling rook movement
  if (move.castling) {
    const baseRow = toRow;
    if (move.castling === 'kingside') {
      undo.castlingRook = { rook: boardState[baseRow][7], fromC: 7, toC: 5 };
      boardState[baseRow][5] = boardState[baseRow][7];
      boardState[baseRow][7] = null;
    } else {
      undo.castlingRook = { rook: boardState[baseRow][0], fromC: 0, toC: 3 };
      boardState[baseRow][3] = boardState[baseRow][0];
      boardState[baseRow][0] = null;
    }
  }

  // Pawn promotion — always promote to queen for AI
  const promoRow = piece.color === 'white' ? 0 : 7;
  if (piece.type === 'pawn' && toRow === promoRow) {
    undo.promoted = true;
    undo.originalPiece = piece;
    const queenKey = piece.color === 'white' ? 'Q' : 'q';
    boardState[toRow][toCol] = makePiece(queenKey);
  }

  // Update lastMove for en passant detection in deeper searches
  lastMove = { piece: { ...piece }, fromRow, fromCol, toRow, toCol };

  return undo;
}

function undoMove(undo) {
  const { fromRow, fromCol, toRow, toCol } = undo;

  // Restore the piece (use original if it was promoted)
  boardState[fromRow][fromCol] = undo.promoted ? undo.originalPiece : boardState[toRow][toCol];
  boardState[toRow][toCol] = undo.captured;

  // Undo en passant capture
  if (undo.epCaptured) {
    boardState[fromRow][toCol] = undo.epCaptured;
  }

  // Undo castling rook
  if (undo.castlingRook) {
    const cr = undo.castlingRook;
    boardState[toRow][cr.fromC] = boardState[toRow][cr.toC];
    boardState[toRow][cr.toC] = null;
  }

  // Restore game state
  lastMove = undo.lastMove;
  hasMoved = undo.hasMoved;
}

// Minimax search (no alpha-beta pruning).
// Returns the evaluation score from the perspective of the maximising player (white).
// depth: remaining depth to search
// isMaximising: true when it's white's turn to move
function minimax(depth, isMaximising) {
  if (depth === 0) {
    return evaluateBoard();
  }

  const color = isMaximising ? 'white' : 'black';
  const moves = generateAllLegalMoves(color);

  // No legal moves: checkmate or stalemate
  if (moves.length === 0) {
    if (isKingInCheck(color, boardState)) {
      // Checkmate — very bad for the side to move
      return isMaximising ? -Infinity : Infinity;
    }
    return 0; // Stalemate
  }

  if (isMaximising) {
    let best = -Infinity;
    for (const move of moves) {
      const undo = applyMove(move);
      const val = minimax(depth - 1, false);
      undoMove(undo);
      if (val > best) best = val;
    }
    return best;
  } else {
    let best = Infinity;
    for (const move of moves) {
      const undo = applyMove(move);
      const val = minimax(depth - 1, true);
      undoMove(undo);
      if (val < best) best = val;
    }
    return best;
  }
}

// Returns the best move for the current player at the given search depth.
// Returns { fromRow, fromCol, toRow, toCol, enPassant?, castling? } or null if no moves.
function getBestMove(depth) {
  const color = currentTurn;
  const isMaximising = color === 'white';
  const moves = generateAllLegalMoves(color);

  if (moves.length === 0) return null;

  let bestMove = null;
  let bestScore = isMaximising ? -Infinity : Infinity;

  for (const move of moves) {
    const undo = applyMove(move);
    const score = minimax(depth - 1, !isMaximising);
    undoMove(undo);

    if (isMaximising) {
      if (score > bestScore) {
        bestScore = score;
        bestMove = move;
      }
    } else {
      if (score < bestScore) {
        bestScore = score;
        bestMove = move;
      }
    }
  }

  return bestMove;
}
