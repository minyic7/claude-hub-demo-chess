<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1a1a2e;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .board-container {
    display: inline-grid;
    grid-template-columns: 2rem repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr) 2rem;
    max-width: min(90vw, 90vh);
    aspect-ratio: 1;
    width: 560px;
    border: 4px solid #16213e;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }

  .rank-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16213e;
    color: #a0a0b0;
    font-size: 0.85rem;
    font-weight: 600;
    width: 2rem;
  }

  .file-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16213e;
    color: #a0a0b0;
    font-size: 0.85rem;
    font-weight: 600;
    height: 2rem;
  }

  .corner {
    background: #16213e;
  }

  .square {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.5rem, 5vw, 3.2rem);
    cursor: pointer;
    user-select: none;
    transition: background-color 0.15s;
    aspect-ratio: 1;
  }

  .square.light { background: #e8dcc8; }
  .square.dark  { background: #7b6b4f; }
  .square:hover { filter: brightness(1.12); }
</style>
</head>
<body>

<div class="board-container" id="board"></div>

<script>
const PIECES = {
  K: { type: 'king',   color: 'white', symbol: '\u2654' },
  Q: { type: 'queen',  color: 'white', symbol: '\u2655' },
  R: { type: 'rook',   color: 'white', symbol: '\u2656' },
  B: { type: 'bishop', color: 'white', symbol: '\u2657' },
  N: { type: 'knight', color: 'white', symbol: '\u2658' },
  P: { type: 'pawn',   color: 'white', symbol: '\u2659' },
  k: { type: 'king',   color: 'black', symbol: '\u265A' },
  q: { type: 'queen',  color: 'black', symbol: '\u265B' },
  r: { type: 'rook',   color: 'black', symbol: '\u265C' },
  b: { type: 'bishop', color: 'black', symbol: '\u265D' },
  n: { type: 'knight', color: 'black', symbol: '\u265E' },
  p: { type: 'pawn',   color: 'black', symbol: '\u265F' },
};

function makePiece(key) {
  if (!key) return null;
  const p = PIECES[key];
  return { type: p.type, color: p.color, symbol: p.symbol };
}

// Board state: board[row][col], row 0 = rank 8 (top)
const INITIAL = [
  ['r','n','b','q','k','b','n','r'],
  ['p','p','p','p','p','p','p','p'],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['' ,'' ,'' ,'' ,'' ,'' ,'' ,''],
  ['P','P','P','P','P','P','P','P'],
  ['R','N','B','Q','K','B','N','R'],
];

const boardState = INITIAL.map(row => row.map(makePiece));

const FILES = ['a','b','c','d','e','f','g','h'];
const container = document.getElementById('board');

for (let row = 0; row < 8; row++) {
  // Rank label
  const rl = document.createElement('div');
  rl.className = 'rank-label';
  rl.textContent = 8 - row;
  container.appendChild(rl);

  for (let col = 0; col < 8; col++) {
    const sq = document.createElement('div');
    const isLight = (row + col) % 2 === 0;
    sq.className = 'square ' + (isLight ? 'light' : 'dark');
    sq.dataset.row = row;
    sq.dataset.col = col;

    const piece = boardState[row][col];
    if (piece) sq.textContent = piece.symbol;

    sq.addEventListener('click', () => {
      // Placeholder for future move selection
    });

    container.appendChild(sq);
  }
}

// File labels row
const corner = document.createElement('div');
corner.className = 'corner';
container.appendChild(corner);

for (const f of FILES) {
  const fl = document.createElement('div');
  fl.className = 'file-label';
  fl.textContent = f;
  container.appendChild(fl);
}
</script>
</body>
</html>
